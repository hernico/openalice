services:
  openalice:
    build:
      context: .
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    env_file:
      - .env
    ports:
      - "127.0.0.1:${OPENALICE_WEB_PORT:-3002}:${OPENALICE_WEB_PORT:-3002}"
    expose:
      - "${OPENALICE_MCP_PORT:-3001}"
      - "${OPENALICE_MARKET_DATA_API_PORT:-6901}"
      - "${OPENALICE_MCP_ASK_PORT:-3003}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${OPENALICE_WEB_PORT:-3002}/api/tools >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
